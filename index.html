<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Buttons Project</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Bootstrap Buttons Demo</h2>

  <!-- Button Styles -->
  <h4>Button Styles</h4>
  <button class="btn btn-primary">Primary</button>
  <button class="btn btn-secondary">Secondary</button>
  <button class="btn btn-success">Success</button>
  <button class="btn btn-danger">Danger</button>
  <button class="btn btn-warning">Warning</button>
  <button class="btn btn-info">Info</button>
  <button class="btn btn-light">Light</button>
  <button class="btn btn-dark">Dark</button>
  <button class="btn btn-link">Link</button>

  <hr>

  <!-- Outline Buttons -->
  <h4>Outline Buttons</h4>
  <button class="btn btn-outline-primary">Primary</button>
  <button class="btn btn-outline-success">Success</button>
  <button class="btn btn-outline-danger">Danger</button>

  <hr>

  <!-- Sizes -->
  <h4>Button Sizes</h4>
  <button class="btn btn-primary btn-lg">Large</button>
  <button class="btn btn-primary">Default</button>
  <button class="btn btn-primary btn-sm">Small</button>

  <hr>

  <!-- Block Button -->
  <h4>Full Width Button</h4>
  <button class="btn btn-primary btn-block">Full Width Button</button>

  <hr>

  <!-- States -->
  <h4>States</h4>
  <button class="btn btn-success active">Active</button>
  <button class="btn btn-danger" disabled>Disabled</button>

  <hr>

  <!-- Button Types -->
  <h4>Button Types</h4>
  <a href="#" class="btn btn-info">Link Button</a>
  <input type="submit" class="btn btn-success" value="Submit Button">

  <hr>

  <!-- Spinner Button -->
  <h4>Loading Button</h4>
  <button class="btn btn-primary">
    <span class="spinner-border spinner-border-sm"></span>
    Loading...
  </button>

  <hr>

  <!-- Real UI Example -->
  <h4>Login Example</h4>
  <button class="btn btn-success">Login</button>
  <button class="btn btn-danger">Cancel</button>
  <button class="btn btn-warning">Reset</button>

</body>
</html>
